<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afinador de Matilde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#ffe0ef;
    --bg2:#ffc9e3;
    --card:#fff5fa;
    --card-edge:#ffd3ea;
    --hot:#ff3d97;
    --hot-dark:#c81c74;
    --magenta:#e0409e;
    --lav:#efb8ea;
    --text:#4a0f34;
    --text-dim:#a1608c;
    --mint:#2fd6a4;
    --mint-dark:#159a72;
    --coral:#ff5c73;
    --mono:'Space Mono', monospace;
    --display:'Baloo 2', sans-serif;
    --sans:'Quicksand', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, #fff0f8 0%, transparent 45%),
      radial-gradient(circle at 100% 15%, #ffd6ec 0%, transparent 50%),
      linear-gradient(160deg, var(--bg1), var(--bg2) 60%, #ffd0e6 100%);
    background-attachment:fixed;
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:34px 16px 60px;
    position:relative;
    overflow-x:hidden;
  }
  body::before, body::after{
    content:"♥"; position:fixed; font-size:100px; color:#ffffff; opacity:.22;
    pointer-events:none; z-index:0;
  }
  body::before{ top:-30px; left:-40px; transform:rotate(-12deg); }
  body::after{ bottom:-40px; right:-30px; transform:rotate(10deg); font-size:120px; }

  .brand{ text-align:center; margin-bottom:20px; position:relative; z-index:1;}
  .brand .eyebrow{
    font-family:var(--mono); letter-spacing:.3em; font-size:11px; color:var(--hot-dark);
    text-transform:uppercase; background:#fff; display:inline-block; padding:4px 12px;
    border-radius:999px; box-shadow:0 2px 0 var(--card-edge);
  }
  .brand h1{
    font-family:var(--display); font-weight:800; font-size:clamp(30px,6vw,46px);
    margin:10px 0 2px; color:var(--hot-dark);
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(200,28,116,.15);
  }
  .brand p{ color:var(--text-dim); font-size:14px; margin:0; font-weight:500; }

  .pedal{
    width:min(560px,94vw);
    background:linear-gradient(180deg,#fff,var(--card));
    border:2px solid var(--card-edge);
    border-radius:28px;
    padding:26px 24px 30px;
    box-shadow:0 22px 44px -18px rgba(200,28,116,.35), inset 0 1px 0 #fff;
    position:relative; z-index:1;
  }

  .screen{
    background:linear-gradient(180deg,#2a0a1c,#1c0713);
    border-radius:20px;
    padding:18px 18px 14px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), inset 0 6px 20px rgba(0,0,0,.5);
  }
  .status-row{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--mono); font-size:11px; color:#e6a8cb; letter-spacing:.06em;
    margin-bottom:6px;
  }
  .status-row .dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:var(--coral); margin-right:6px; box-shadow:0 0 6px var(--coral);
    transition:background .15s, box-shadow .15s;
  }
  .status-row .dot.live{background:var(--mint); box-shadow:0 0 8px var(--mint);}

  .gauge-wrap{ position:relative; height:150px; margin:6px auto 4px; max-width:440px;}
  svg#gauge{ width:100%; height:100%; overflow:visible; }
  .needle{ transform-origin:220px 150px; transition:transform .04s linear; }
  .tick{ stroke:#5a2440; stroke-width:2; }
  .tick.center{ stroke:var(--mint); stroke-width:3; }
  .tick.strong{ stroke:#8a3a63; }

  .target-tag{
    text-align:center; font-family:var(--mono); font-size:11px; color:#e6a8cb; letter-spacing:.05em; margin-top:2px;
  }
  .target-tag b{ color:#ffd7ec; }

  .readout{ display:flex; align-items:baseline; justify-content:center; gap:14px; margin-top:2px; }
  .note-name{
    font-family:var(--display); font-weight:700; font-size:64px; line-height:1;
    color:var(--hot); text-shadow:0 0 20px rgba(255,61,151,.5);
    min-width:110px; text-align:center;
  }
  .note-name.in-tune{ color:var(--mint); text-shadow:0 0 22px rgba(47,214,164,.55); }
  .sub-readout{ font-family:var(--mono); font-size:13px; color:#e6a8cb; text-align:left; }
  .sub-readout .cents{ font-size:16px; color:#fff; }
  .cents.flat, .cents.sharp{ color:var(--coral); }
  .cents.ok{ color:var(--mint); }

  .mic-btn{
    display:block; margin:16px auto 4px; padding:13px 28px;
    font-family:var(--display); font-weight:700; letter-spacing:.02em; font-size:16px;
    color:#fff; background:linear-gradient(180deg,var(--hot),var(--hot-dark)); border:none; border-radius:999px; cursor:pointer;
    box-shadow:0 6px 0 #9c1259, 0 10px 18px rgba(200,28,116,.35);
    transition:transform .06s;
  }
  .mic-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #9c1259; }
  .mic-btn.on{ background:linear-gradient(180deg,var(--mint),var(--mint-dark)); box-shadow:0 6px 0 #0d7256, 0 10px 18px rgba(21,154,114,.35); }
  .hint{ text-align:center; font-size:12px; color:var(--text-dim); margin-top:8px; min-height:16px; font-weight:600;}

  .chroma-btn{
    display:block; margin:6px auto 0; padding:8px 16px;
    font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--hot-dark); background:#fff; border:2px solid var(--card-edge); border-radius:999px;
    cursor:pointer; transition:background .12s, border-color .12s, color .12s;
  }
  .chroma-btn.active{ background:var(--mint); border-color:var(--mint-dark); color:#fff; }

  .mode-toggle{
    display:flex; gap:8px; margin-top:22px; background:#ffe6f2; padding:5px;
    border-radius:14px; border:2px solid var(--card-edge);
  }
  .mode-btn{
    flex:1; padding:10px 8px; border:none; border-radius:10px; cursor:pointer;
    font-family:var(--display); font-weight:700; font-size:13.5px; letter-spacing:.01em;
    background:transparent; color:var(--text-dim); transition:background .12s, color .12s;
  }
  .mode-btn.active{ background:#fff; color:var(--hot-dark); box-shadow:0 3px 8px rgba(200,28,116,.18); }
  .strings-actions{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .action-btn{
    flex:1; min-width:150px; padding:11px 14px; border-radius:12px; cursor:pointer;
    font-family:var(--display); font-weight:700; font-size:13.5px; letter-spacing:.01em;
    border:2px solid var(--card-edge); background:#fff; color:var(--hot-dark);
    transition:background .12s, color .12s, border-color .12s, transform .06s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .action-btn:hover{ border-color:var(--hot); }
  .action-btn:active{ transform:translateY(1px); }
  .action-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .action-btn.playing-all{ background:var(--hot); border-color:var(--hot); color:#fff; }

  .record-panel{
    margin-top:14px; background:#ffe6f2; border:2px solid var(--card-edge);
    border-radius:14px; padding:12px 14px 14px;
  }
  .record-panel .settings-title{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--hot-dark); font-weight:700; margin-bottom:8px;
  }
  .record-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .record-btn{
    padding:10px 18px; border:none; border-radius:999px; cursor:pointer;
    font-family:var(--display); font-weight:700; font-size:13.5px;
    color:#fff; background:linear-gradient(180deg,var(--coral),#c8354a);
    box-shadow:0 4px 0 #9c1f30; display:flex; align-items:center; gap:7px;
  }
  .record-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #9c1f30; }
  .record-btn.recording{ background:linear-gradient(180deg,#7a1f2e,#4a0f18); box-shadow:0 4px 0 #2d0910; }
  .record-btn .rec-dot{
    width:9px; height:9px; border-radius:50%; background:#fff; display:inline-block;
  }
  .record-btn.recording .rec-dot{ background:#fff; animation:blink 1s infinite; }
  @keyframes blink{ 50%{opacity:.25;} }
  .record-timer{ font-family:var(--mono); font-size:13px; color:var(--text-dim); min-width:52px; }
  .record-exports{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .export-btn{
    padding:9px 16px; border-radius:999px; border:2px solid var(--mint-dark); background:var(--mint);
    color:#fff; font-family:var(--mono); font-size:11.5px; font-weight:700; letter-spacing:.03em;
    cursor:pointer;
  }
  .export-btn:disabled{ opacity:.45; cursor:not-allowed; background:#bbb; border-color:#999; }
  .export-btn.ghost{ background:#fff; color:var(--hot-dark); border-color:var(--card-edge); }
  .record-note{ font-size:11.5px; color:var(--text-dim); margin-top:6px; font-weight:600; }

  .record-visual-wrap{
    position:relative; margin-top:10px; height:64px; border-radius:12px; overflow:hidden;
    background:linear-gradient(180deg,#2a0a1c,#1c0713);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
    display:none;
  }
  .record-visual-wrap.show{ display:block; }
  canvas#recVisualizer{ width:100%; height:100%; display:block; }

  .countdown-overlay{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(28,7,19,.72); border-radius:12px; z-index:3;
  }
  .countdown-overlay.show{ display:flex; }
  .countdown-num{
    font-family:var(--display); font-weight:800; font-size:40px; color:#fff;
    text-shadow:0 0 18px var(--hot); animation:pop .5s ease;
  }
  @keyframes pop{ 0%{ transform:scale(.4); opacity:0; } 60%{ transform:scale(1.15); opacity:1; } 100%{ transform:scale(1); } }

  .track-list{ display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .track-item{
    display:flex; align-items:center; gap:10px; background:#fff; border:2px solid var(--card-edge);
    border-radius:12px; padding:8px 10px; transition:border-color .12s, box-shadow .12s;
  }
  .track-item.selected{ border-color:var(--mint); box-shadow:0 0 0 3px rgba(47,214,164,.2); }
  .track-play{
    flex:0 0 auto; width:32px; height:32px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(180deg,var(--hot),var(--hot-dark)); color:#fff; font-size:12px;
    display:flex; align-items:center; justify-content:center;
  }
  .track-play.playing{ background:linear-gradient(180deg,var(--mint),var(--mint-dark)); }
  .track-info{ flex:1; min-width:0; cursor:pointer; }
  .track-name{ font-family:var(--display); font-weight:700; font-size:13.5px; color:var(--hot-dark); }
  .track-dur{ font-family:var(--mono); font-size:10.5px; color:var(--text-dim); }
  .track-actions{ display:flex; gap:6px; flex:0 0 auto; }
  .track-icon-btn{
    width:28px; height:28px; border-radius:8px; border:2px solid var(--card-edge); background:#fff;
    color:var(--hot-dark); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center;
  }
  .track-icon-btn:hover{ border-color:var(--hot); }
  .track-empty-note{ font-size:11.5px; color:var(--text-dim); margin-top:8px; font-weight:600; text-align:center; }

  .mode-note{ text-align:center; font-size:12px; color:var(--text-dim); margin-top:8px; font-weight:600; }

  .controls{ display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
  .field{ flex:1; min-width:150px; }
  .field label{
    display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em;
    color:var(--hot-dark); text-transform:uppercase; margin-bottom:6px; font-weight:700;
  }
  select{
    width:100%; padding:11px 12px; background:#fff; color:var(--text);
    border:2px solid var(--card-edge); border-radius:12px; font-family:var(--sans); font-weight:600; font-size:14px;
    appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, var(--hot) 50%), linear-gradient(135deg, var(--hot) 50%, transparent 50%);
    background-position: calc(100% - 18px) center, calc(100% - 13px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat:no-repeat;
    cursor:pointer;
  }

  .lang-switch{
    position:absolute; top:14px; right:16px; z-index:2;
    display:flex; gap:4px; background:#fff; padding:4px; border-radius:999px;
    box-shadow:0 2px 0 var(--card-edge);
  }
  .lang-btn{
    border:none; background:transparent; cursor:pointer; padding:5px 9px;
    font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.03em;
    color:var(--text-dim); border-radius:999px; transition:background .12s, color .12s;
  }
  .lang-btn.active{ background:var(--hot); color:#fff; }
  @media (max-width:480px){ .lang-switch{ position:static; justify-content:center; margin:0 0 12px; } }

  .mic-settings{
    margin-top:14px; background:#ffe6f2; border:2px solid var(--card-edge);
    border-radius:14px; padding:12px 14px 14px;
  }
  .mic-settings .settings-title{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--hot-dark); font-weight:700; margin-bottom:8px;
  }
  .mic-settings .row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .mic-settings .row:last-child{ margin-bottom:0; }
  .mic-settings .field{ flex:1; min-width:150px; }
  .mic-settings .field.small{ max-width:150px; }
  .mic-settings input[type=range]{ width:100%; accent-color:var(--hot); }
  .mic-settings .range-val{ font-family:var(--mono); font-size:11px; color:var(--text-dim); }
  .mic-toggles{ display:flex; gap:14px; flex-wrap:wrap; }
  .mic-toggles label{
    display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:var(--text);
    cursor:pointer;
  }
  .mic-refresh{
    font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
    background:#fff; border:2px solid var(--card-edge); color:var(--hot-dark);
    border-radius:999px; padding:6px 12px; cursor:pointer; margin-top:2px;
  }

  .strings{ display:grid; grid-template-columns:repeat(auto-fit,minmax(78px,1fr)); gap:10px; margin-top:20px; }
  .string-btn{
    background:#fff; border:2px solid var(--card-edge); border-radius:14px;
    padding:12px 6px 10px; text-align:center; cursor:pointer; color:var(--text);
    transition:border-color .12s, background .12s, transform .12s;
  }
  .string-btn:hover{ border-color:var(--hot); transform:translateY(-2px); }
  .string-btn.playing{ background:#ffe3f1; border-color:var(--hot); }
  .string-btn.target{ border-color:var(--mint); box-shadow:0 0 0 3px rgba(47,214,164,.25); }
  .string-btn .sname{ font-family:var(--display); font-weight:700; font-size:20px; }
  .string-btn .sfreq{ display:block; font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:3px;}

  @media (prefers-reduced-motion: reduce){ .needle{ transition:none; } }
</style>
</head>
<body>

<div class="lang-switch" id="langSwitch">
  <button type="button" class="lang-btn" data-lang="es">ES</button>
  <button type="button" class="lang-btn" data-lang="en">EN</button>
  <button type="button" class="lang-btn" data-lang="pt">PT</button>
  <button type="button" class="lang-btn" data-lang="ja">JA</button>
</div>

<div class="brand">
  <h1>Afinador de Matilde</h1>
</div>

<div class="pedal">
  <div class="screen">
    <div class="status-row">
      <span><span class="dot" id="statusDot"></span><span id="statusText">MIC APAGADO</span></span>
      <span id="freqTag">0.0 Hz</span>
    </div>

    <div class="gauge-wrap">
      <svg id="gauge" viewBox="0 0 440 160">
        <g id="ticks"></g>
        <line class="needle" id="needle" x1="220" y1="150" x2="220" y2="26" stroke="var(--hot)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="220" cy="150" r="6" fill="var(--hot)"/>
      </svg>
    </div>

    <div class="readout">
      <div class="note-name" id="noteName">—</div>
      <div class="sub-readout">
        <div><span class="cents" id="centsVal">0</span> <span id="centsUnit">centésimas</span></div>
        <div id="targetName">objetivo: —</div>
      </div>
    </div>
  </div>

  <button class="mic-btn" id="micBtn">ACTIVAR MICRÓFONO</button>
  <div class="hint" id="hint">Pulsa el botón, toca una cuerda y la afinación te guía sola.</div>
  <button type="button" class="chroma-btn" id="chromaticToggle">Modo cromático libre: OFF</button>

  <div class="mode-toggle" id="modeToggle">
    <button type="button" class="mode-btn active" data-mode="common">Afinaciones comunes</button>
    <button type="button" class="mode-btn" data-mode="bandas">Afinaciones de bandas</button>
  </div>

  <div class="controls">
    <div class="field">
      <label for="instrument" id="lblInstrument">Instrumento</label>
      <select id="instrument">
        <option value="guitar">Guitarra (6 cuerdas)</option>
        <option value="guitar7">Guitarra (7 cuerdas)</option>
        <option value="bass4">Bajo (4 cuerdas)</option>
        <option value="bass5">Bajo (5 cuerdas)</option>
        <option value="bass6">Bajo (6 cuerdas)</option>
      </select>
    </div>
    <div class="field">
      <label for="tuning" id="lblTuning">Afinación</label>
      <select id="tuning"></select>
    </div>
    <div class="field" style="max-width:120px;">
      <label for="a4Calib" id="lblA4">Referencia A4</label>
      <select id="a4Calib">
        <option value="438">438 Hz</option>
        <option value="439">439 Hz</option>
        <option value="440" selected>440 Hz</option>
        <option value="441">441 Hz</option>
        <option value="442">442 Hz</option>
        <option value="443">443 Hz</option>
        <option value="444">444 Hz</option>
        <option value="445">445 Hz</option>
      </select>
    </div>
  </div>

  <div class="mic-settings" id="micSettings">
    <div class="settings-title" id="micSettingsTitle">Configuración de micrófono / interfaz</div>
    <div class="row">
      <div class="field">
        <label for="micDevice" id="lblMicDevice">Entrada de audio</label>
        <select id="micDevice"><option value="">Predeterminado del sistema</option></select>
      </div>
      <button type="button" class="mic-refresh" id="micRefresh">Actualizar lista</button>
    </div>
    <div class="row">
      <div class="field small">
        <label for="micGain"><span id="lblMicGain">Ganancia de entrada</span> <span class="range-val" id="micGainVal">0 dB</span></label>
        <input type="range" id="micGain" min="0" max="24" step="1" value="0">
      </div>
      <div class="field small">
        <label for="noiseGateSlider"><span id="lblNoiseGate">Sensibilidad</span> <span class="range-val" id="noiseGateVal">media</span></label>
        <input type="range" id="noiseGateSlider" min="1" max="50" step="1" value="25">
      </div>
    </div>
    <div class="row">
      <div class="mic-toggles">
        <label><input type="checkbox" id="echoCancel"><span id="lblEcho">Cancelación de eco</span></label>
        <label><input type="checkbox" id="noiseSuppress"><span id="lblNoise">Supresión de ruido</span></label>
        <label><input type="checkbox" id="autoGain"><span id="lblAutoGain">Ganancia automática</span></label>
      </div>
    </div>
  </div>

  <div class="mode-note" id="modeNote"></div>
  <div class="strings" id="strings"></div>

  <div class="strings-actions">
    <button type="button" class="action-btn" id="playAllBtn">▶ Reproducir todas las cuerdas</button>
  </div>

  <div class="record-panel" id="recordPanel">
    <div class="settings-title" id="recordPanelTitle">Grabación</div>
    <div class="record-row">
      <button type="button" class="record-btn" id="recordBtn"><span class="rec-dot"></span><span id="recordBtnLabel">Grabar</span></button>
      <span class="record-timer" id="recordTimer">00:00</span>
    </div>
    <div class="record-visual-wrap" id="recVisualWrap">
      <canvas id="recVisualizer" width="440" height="64"></canvas>
      <div class="countdown-overlay" id="countdownOverlay"><span class="countdown-num" id="countdownNum">3</span></div>
    </div>
    <div class="record-note" id="recordNote"></div>
    <div class="track-list" id="trackList"></div>
    <div class="track-empty-note" id="trackEmptyNote">Aún no hay pistas grabadas.</div>
    <div class="record-exports" id="recordExports" style="display:none;">
      <button type="button" class="export-btn" id="exportSelectedBtn">Exportar pista seleccionada</button>
      <button type="button" class="export-btn ghost" id="exportAllBtn">Exportar todo</button>
    </div>
  </div>
</div>



<script>
/* ================= Datos de afinaciones ================= */
const NOTE_ORDER = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

let A4REF = 440; // referencia de afinación calibrable (438–445 Hz)

function noteFreq(name, octave){
  const idx = NOTE_ORDER.indexOf(name);
  const semitoneFromA4 = (idx - NOTE_ORDER.indexOf('A')) + (octave-4)*12;
  return A4REF * Math.pow(2, semitoneFromA4/12);
}
function mkString(name, octave){
  const idx = NOTE_ORDER.indexOf(name);
  const semitone = (idx - NOTE_ORDER.indexOf('A')) + (octave-4)*12;
  return { note:name, octave, semitone, freq: A4REF * Math.pow(2, semitone/12) };
}
/* Recalcula todas las frecuencias del árbol TUNINGS cuando cambia la referencia A4 */
function rescaleFrequencies(node){
  if(Array.isArray(node)){
    node.forEach(s=>{ if(typeof s.semitone==='number') s.freq = A4REF*Math.pow(2, s.semitone/12); });
    return;
  }
  if(node && typeof node==='object'){
    Object.values(node).forEach(rescaleFrequencies);
  }
}

(function drawTicks(){
  const cx=220, cy=150, rOuter=124, rInner=108;
  for(let c=-50;c<=50;c+=5){
    const angle = (c/50) * 55;
    const rad = (angle-90) * Math.PI/180;
    const rI = (c%25===0)? rInner-14 : rInner;
    const x1 = cx + rI*Math.cos(rad), y1 = cy + rI*Math.sin(rad);
    const x2 = cx + rOuter*Math.cos(rad), y2 = cy + rOuter*Math.sin(rad);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('class', c===0?'tick center': (c%25===0?'tick strong':'tick'));
    ticksG.appendChild(line);
  }
})();

/* ================= Tono guía: modelado físico de cuerda pulsada ================= */
/* Karplus-Strong extendido (Jaffe & Smith, 1983): un filtro comb con feedback
   simula la vibración real de una cuerda -- se excita con una ráfaga de ruido
   (el "golpe" de la púa/dedo) y un filtro de amortiguación + un filtro allpass
   de retardo fraccional la hacen decaer de forma natural y con afinación exacta
   (no solo a semitonos, sino a la frecuencia decimal justa). Esto es mucho más
   realista que sumar osciladores sinusoidales, porque el propio modelo genera
   todos los armónicos e inarmonicidades de una cuerda real. */
const KS_WORKLET_SOURCE = `
class KarplusStrongProcessor extends AudioWorkletProcessor {
  constructor(){
    super();
    this.buffer = null; this.N = 0; this.writeIdx = 0;
    this.C = 0; this.apIn = 0; this.apOut = 0; this.damping = 0.995;
    this.active = false;
    this.port.onmessage = (e)=>{
      if(e.data.type==='pluck') this.trigger(e.data.frequency, e.data.damping, e.data.brightness);
    };
  }
  trigger(freq, damping, brightness){
    const sr = sampleRate;
    const L = sr/freq;
    const N = Math.max(4, Math.floor(L));
    const P = L - N; // parte fraccional -> afinación exacta vía filtro allpass
    this.N = N;
    this.C = (1-P)/(1+P);
    this.damping = damping;
    this.buffer = new Float32Array(N);
    let prev = 0;
    for(let i=0;i<N;i++){
      const white = Math.random()*2-1;
      prev = brightness*white + (1-brightness)*prev; // ráfaga de excitación tipo púa/dedo
      this.buffer[i] = prev;
    }
    this.writeIdx = 0; this.apIn = 0; this.apOut = 0;
    this.active = true;
  }
  process(inputs, outputs){
    const out = outputs[0][0];
    if(!this.active || !this.buffer){ out.fill(0); return true; }
    const N = this.N;
    for(let i=0;i<out.length;i++){
      const s = this.buffer[this.writeIdx];
      out[i] = s;
      const nextIdx = (this.writeIdx+1)%N;
      const avg = 0.5*(s + this.buffer[nextIdx]); // amortiguación (pasa-bajos de un polo)
      const apOut = this.C*(avg - this.apOut) + this.apIn; // retardo fraccional (afinación exacta)
      this.apIn = avg; this.apOut = apOut;
      this.buffer[this.writeIdx] = this.damping*apOut;
      this.writeIdx = nextIdx;
    }
    return true;
  }
}
registerProcessor('karplus-strong', KarplusStrongProcessor);
`;

let workletReady = null;
function ensureAudioCtx(){
  if(!audioCtx){
    const Ctor = window.AudioContext||window.webkitAudioContext;
    // Intentamos abrir el contexto a la mayor tasa de muestreo posible para máxima fidelidad.
    // El navegador ajusta automáticamente al máximo que soporte el hardware si el valor pedido es muy alto.
    let created = null;
    for(const sr of [192000, 96000, 48000]){
      try{ created = new Ctor({ sampleRate: sr }); break; }catch(e){ created = null; }
    }
    audioCtx = created || new Ctor();
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(!workletReady){
    try{
      const blobUrl = URL.createObjectURL(new Blob([KS_WORKLET_SOURCE], {type:'application/javascript'}));
      workletReady = audioCtx.audioWorklet.addModule(blobUrl);
    }catch(e){
      workletReady = Promise.reject(e);
    }
  }
  return audioCtx;
}

async function playReference(str, btn){
  const ctx = ensureAudioCtx();
  try{
    await workletReady;
    playReferencePhysical(ctx, str, btn);
  }catch(e){
    // navegador sin soporte de AudioWorklet: respaldo con síntesis aditiva
    playReferenceFallback(ctx, str, btn);
  }
}

function playReferencePhysical(ctx, str, btn){
  const inst = instrumentSel.value;
  const isBass = inst!=='guitar' && inst!=='guitar7';

  const node = new AudioWorkletNode(ctx, 'karplus-strong');

  // filtro de cuerpo/caja: resalta el rango donde resuena el cuerpo del instrumento
  const body = ctx.createBiquadFilter();
  body.type = 'peaking';
  body.frequency.value = isBass? 110 : 220;
  body.Q.value = 0.9;
  body.gain.value = isBass? 5 : 3.5;

  // calidez: corta brillo excesivo del modelo, como las cuerdas reales
  const warmth = ctx.createBiquadFilter();
  warmth.type = 'lowpass';
  warmth.frequency.value = isBass? 3200 : 6800;
  warmth.Q.value = 0.5;

  // presencia del ataque de púa/dedo
  const presence = ctx.createBiquadFilter();
  presence.type = 'highshelf';
  presence.frequency.value = isBass? 1800 : 3200;
  presence.gain.value = isBass? -2 : 1.5;

  const master = ctx.createGain();
  master.gain.value = isBass? 1.3 : 1.05;

  node.connect(body).connect(warmth).connect(presence).connect(master).connect(ctx.destination);

  const damping = isBass? 0.9985 : 0.9975;   // cuerdas graves sostienen más tiempo, como en la realidad
  const brightness = isBass? 0.35 : 0.55;    // el ataque de una guitarra suena más brillante que el de un bajo
  node.port.postMessage({type:'pluck', frequency: str.freq, damping, brightness});

  const life = isBass? 3.4 : 2.6;
  setTimeout(()=>{ try{ node.disconnect(); master.disconnect(); }catch(e){} }, life*1000+250);

  document.querySelectorAll('.string-btn.playing').forEach(b=>b.classList.remove('playing'));
  btn.classList.add('playing');
  targetName.textContent = `${t('targetPrefix')}: ${str.note}${str.octave} · ${str.freq.toFixed(2)} Hz`;
  setTimeout(()=>btn.classList.remove('playing'), life*1000);
}

/* Respaldo (solo si el navegador no soporta AudioWorklet) */
function playReferenceFallback(ctx, str, btn){
  const inst = instrumentSel.value;
  const isBass = inst!=='guitar' && inst!=='guitar7';
  const now = ctx.currentTime;

  const master = ctx.createGain();
  master.gain.value = 1;
  const filt = ctx.createBiquadFilter();
  filt.type='lowpass';
  filt.frequency.value = isBass? 1400 : 5200;
  filt.Q.value = 0.6;
  master.connect(filt).connect(ctx.destination);

  const harmonics = isBass? [1,2,3,4] : [1,2,3,4,5,6];
  const decay = isBass? 2.6 : 1.9;
  harmonics.forEach((h,i)=>{
    const o = ctx.createOscillator();
    o.type = i===0 ? 'triangle' : 'sine';
    o.frequency.value = str.freq*h;
    const g = ctx.createGain();
    const peak = (isBass? 0.5 : 0.34) / Math.pow(h, isBass?1.6:1.25);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(Math.max(peak,0.0005), now+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, now+decay/(1+i*0.35));
    o.connect(g).connect(master);
    o.start(now);
    o.stop(now+decay+0.4);
  });

  document.querySelectorAll('.string-btn.playing').forEach(b=>b.classList.remove('playing'));
  btn.classList.add('playing');
  targetName.textContent = `${t('targetPrefix')}: ${str.note}${str.octave} · ${str.freq.toFixed(2)} Hz`;
  setTimeout(()=>btn.classList.remove('playing'), decay*1000);
}

function drawVisualizerFrame(){
  if(!recAnalyser) return;
  const bufferLen = recAnalyser.frequencyBinCount;
  const data = new Uint8Array(bufferLen);
  recAnalyser.getByteFrequencyData(data);
  const ctx2d = recVisualizer.getContext('2d');
  const W = recVisualizer.width, H = recVisualizer.height;
  ctx2d.clearRect(0,0,W,H);
  const barCount = 40;
  const step = Math.floor(bufferLen/barCount) || 1;
  const barW = W/barCount;
  for(let i=0;i<barCount;i++){
    const v = data[i*step]/255;
    const h = Math.max(2, v*H*0.92);
    const x = i*barW;
    const y = H-h;
    const grad = ctx2d.createLinearGradient(0,y,0,H);
    grad.addColorStop(0, '#ff3d97');
    grad.addColorStop(1, '#2fd6a4');
    ctx2d.fillStyle = grad;
    const r = Math.min(3, barW*0.35);
    ctx2d.beginPath();
    ctx2d.moveTo(x+r, y);
    ctx2d.arcTo(x+barW-1, y, x+barW-1, y+r, r);
    ctx2d.lineTo(x+barW-1, H);
    ctx2d.lineTo(x, H);
    ctx2d.arcTo(x, y, x+r, y, r);
    ctx2d.closePath();
    ctx2d.fill();
  }
  recVisRaf = requestAnimationFrame(drawVisualizerFrame);
}

function runCountdown(){
  return new Promise(resolve=>{
    isCountingDown = true;
    recVisualWrap.classList.add('show');
    countdownOverlay.classList.add('show');
    let n = 3;
    countdownNum.textContent = String(n);
    countdownNum.style.animation = 'none'; void countdownNum.offsetWidth; countdownNum.style.animation = '';
    const step = ()=>{
      n--;
      if(n<=0){
        countdownOverlay.classList.remove('show');
        isCountingDown = false;
        resolve();
        return;
      }
      countdownNum.textContent = String(n);
      countdownNum.style.animation = 'none'; void countdownNum.offsetWidth; countdownNum.style.animation = '';
      setTimeout(step, 700);
    };
    setTimeout(step, 700);
  });
}

function startRecording(){
  if(!micGainNode || !audioCtx){ recordNote.textContent = t('recordEmpty'); return; }
  recBuffers = [];
  recSampleRateActual = audioCtx.sampleRate;

  recProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
  recSilentGain = audioCtx.createGain();
  recSilentGain.gain.value = 0; // no queremos escuchar la grabación en los parlantes
  micGainNode.connect(recProcessor);
  recProcessor.connect(recSilentGain);
  recSilentGain.connect(audioCtx.destination);
  recProcessor.onaudioprocess = (e)=>{
    recBuffers.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };

  recAnalyser = audioCtx.createAnalyser();
  recAnalyser.fftSize = 256;
  recAnalyser.smoothingTimeConstant = 0.75;
  micGainNode.connect(recAnalyser);

  isRecording = true;

  recordNote.textContent = '';
  recStartTs = Date.now();
  recordTimer.textContent = '00:00';

function finishRecording(){
  const total = recBuffers.reduce((a,b)=>a+b.length,0);
  if(total===0){
    recordNote.textContent = t('recordEmpty');
    return;
  }
  const merged = new Float32Array(total);
  let off=0;
  recBuffers.forEach(b=>{ merged.set(b, off); off+=b.length; });
  recBuffers = [];
  trackCounter++;
  const rate = recSampleRateActual;
  const blob = encodeWav(merged, rate);
  const url = URL.createObjectURL(blob);
  const track = {
    id: 'track_'+trackCounter+'_'+Date.now(),
    name: t('trackName')+' '+trackCounter,
    pcm: merged, rate, blob, url,
    duration: merged.length/rate,
  };
  tracks.push(track);
  selectedTrackId = track.id;
  renderTrackList();
  recordNote.textContent = t('recordDone');
  updateExportButtonsState();
}

function stopRecording(){
  isRecording = false;
  clearInterval(recTimerInterval);
  if(recProcessor){ recProcessor.disconnect(); recProcessor.onaudioprocess = null; recProcessor = null; }
  if(recSilentGain){ recSilentGain.disconnect(); recSilentGain = null; }
  if(recAnalyser){ recAnalyser.disconnect(); recAnalyser = null; }
  if(recVisRaf){ cancelAnimationFrame(recVisRaf); recVisRaf = null; }
  const ctx2d = recVisualizer.getContext('2d');

}

function encodeWav(float32, sampleRate){
  // WAV PCM float de 32 bits (IEEE float, formato 3): conserva exactamente la resolución
  // que entrega el motor de audio del navegador, sin cuantizar a enteros de 16 bits.
  // Es la máxima fidelidad posible al grabar en una plataforma web.
  const bytesPerSample = 4;
  const buffer = new ArrayBuffer(44 + float32.length*bytesPerSample);
  const view = new DataView(buffer);
  const writeStr = (off,str)=>{ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
  writeStr(0,'RIFF');
  view.setUint32(4, 36+float32.length*bytesPerSample, true);
  writeStr(8,'WAVE');
  writeStr(12,'fmt ');
  view.setUint32(16,16,true);
  view.setUint16(20,3,true);          // 3 = IEEE float
  view.setUint16(22,1,true);          // mono
  view.setUint32(24,sampleRate,true);
  view.setUint32(28, sampleRate*bytesPerSample,true);
  view.setUint16(32, bytesPerSample,true);
  view.setUint16(34,32,true);         // 32 bits por muestra
  writeStr(36,'data');
  view.setUint32(40, float32.length*bytesPerSample,true);
  let off=44;
  for(let i=0;i<float32.length;i++, off+=4){
    view.setFloat32(off, float32[i], true);
  }
  return new Blob([view], {type:'audio/wav'});
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

/* ---- Detector de tono: YIN (Cheveigné & Kawahara, 2002) ----
   Es el algoritmo que usan la mayoría de afinadores profesionales
   (mucho más preciso y estable en graves que la autocorrelación simple). */
const YIN_THRESHOLD = 0.12;      // qué tan "limpio" debe verse el periodo (más bajo = más estricto)
let NOISE_GATE = 0.0025;         // nivel mínimo de señal para intentar detectar (sensibilidad de entrada, ajustable)

function rmsOf(buffer){
  let sum=0;
  for(let i=0;i<buffer.length;i++) sum += buffer[i]*buffer[i];
  return Math.sqrt(sum/buffer.length);
}

function yinDetect(buffer, sampleRate){
  const bufferSize = buffer.length;
  const halfSize = Math.floor(bufferSize/2);
  const yinBuffer = new Float32Array(halfSize);

  // 1) función de diferencia
  for(let tau=0; tau<halfSize; tau++){
    let sum = 0;
    for(let i=0;i<halfSize;i++){
      const delta = buffer[i]-buffer[i+tau];
      sum += delta*delta;
    }
    yinBuffer[tau] = sum;
  }

  // 2) normalización acumulativa (CMND)
  yinBuffer[0] = 1;
  let runningSum = 0;
  for(let tau=1; tau<halfSize; tau++){
    runningSum += yinBuffer[tau];
    yinBuffer[tau] = runningSum===0 ? 1 : yinBuffer[tau]*tau/runningSum;
  }

  // 3) primer mínimo bajo el umbral (evita octavas falsas)
  let tauEstimate = -1;
  for(let tau=2; tau<halfSize; tau++){
    if(yinBuffer[tau] < YIN_THRESHOLD){
      while(tau+1<halfSize && yinBuffer[tau+1] < yinBuffer[tau]) tau++;
      tauEstimate = tau;
      break;
    }
  }
  if(tauEstimate===-1) return {freq:-1, clarity:0};

  // 4) interpolación parabólica para precisión sub-muestra
  const x0 = tauEstimate>1 ? tauEstimate-1 : tauEstimate;
  const x2 = tauEstimate+1<halfSize ? tauEstimate+1 : tauEstimate;
  let betterTau = tauEstimate;
  if(x0!==tauEstimate && x2!==tauEstimate){
    const s0=yinBuffer[x0], s1=yinBuffer[tauEstimate], s2=yinBuffer[x2];
    const denom = (2*s1-s2-s0);
    if(denom!==0) betterTau = tauEstimate + (s2-s0)/(2*denom);
  }

  const clarity = 1 - yinBuffer[tauEstimate]; // 0..1, qué tan periódica/limpia es la señal
  return { freq: sampleRate/betterTau, clarity };
}

function freqToChromaticName(freq){
  const semitonesFromA4 = 12 * Math.log2(freq/A4REF);
  const rounded = Math.round(semitonesFromA4);
  let idx = ((rounded % 12)+12+NOTE_ORDER.indexOf('A'))%12;
  const noteName = NOTE_ORDER[idx];
  const octave = 4 + Math.floor((rounded+NOTE_ORDER.indexOf('A'))/12);
  return noteName+octave;
}
function nearestChromaticCents(freq){
  const semitonesFromA4 = 12 * Math.log2(freq/A4REF);
  const rounded = Math.round(semitonesFromA4);
  return (semitonesFromA4-rounded)*100;
}

function nearestStringMatch(freq){
  // También evalúa freq/2 y freq*2: los micrófonos a veces detectan un armónico
  // en vez del fundamental, lo que antes hacía "saltar" a la cuerda equivocada
  // una octava arriba o abajo. Los candidatos armónicos llevan una pequeña
  // penalización para que solo ganen si calzan claramente mejor.
  let best = {idx:0, cents:Infinity, score:Infinity};
  const candidates = [{f:freq, penalty:0}, {f:freq/2, penalty:9}, {f:freq*2, penalty:9}];
  currentStrings.forEach((s,i)=>{
    candidates.forEach(({f:cf, penalty})=>{
      const cents = 1200*Math.log2(cf/s.freq);
      const score = Math.abs(cents)+penalty;
      if(score < best.score){ best = {idx:i, cents, score}; }
    });
  });
  return {idx:best.idx, cents:best.cents};
}

function setNeedle(cents){
  const clamped = Math.max(-50, Math.min(50, cents));
  const angle = (clamped/50)*55;
  needle.setAttribute('transform', `rotate(${angle} 220 150)`);
}

/* ---- Estabilización: mediana de las últimas lecturas + suavizado de la aguja ----
   Esto es lo que hace que un afinador se sienta "profesional": la nota no debe
   temblar ni saltar de una cuerda a otra por un armónico o ruido pasajero. */
const FREQ_HISTORY_SIZE = 8;
let freqHistory = [];
let displayedCents = 0;      // valor suavizado que mueve la aguja (evita saltos bruscos)
let lockedIdx = -1;          // cuerda "enganchada" actualmente (con histéresis)
let candidateIdx = -1;
let candidateStreak = 0;
let silenceFrames = 0;
let chromaticMode = false;   // modo cromático libre: ignora la afinación seleccionada

function median(arr){
  const s = [...arr].sort((a,b)=>a-b);
  return s[Math.floor(s.length/2)];
}

const timeData = new Float32Array(4096);
function detectPitchLoop(){
  if(!analyser) return;
  analyser.getFloatTimeDomainData(timeData);
  const rms = rmsOf(timeData);

  if(rms < NOISE_GATE || (!chromaticMode && currentStrings.length===0)){
    silenceFrames++;
    if(silenceFrames>10){ freqHistory.length=0; lockedIdx=-1; candidateIdx=-1; candidateStreak=0; }
    rafId = requestAnimationFrame(detectPitchLoop);
    return;
  }
  silenceFrames = 0;

  const {freq, clarity} = yinDetect(timeData, audioCtx.sampleRate);

  if(freq===-1 || freq<20 || freq>1200 || clarity<0.85){
    rafId = requestAnimationFrame(detectPitchLoop);
    return;
  }

  freqHistory.push(freq);
  if(freqHistory.length>FREQ_HISTORY_SIZE) freqHistory.shift();
  if(freqHistory.length<3){
    rafId = requestAnimationFrame(detectPitchLoop);
    return;
  }
  const stableFreq = median(freqHistory);

  let cents, labelHtml;
  if(chromaticMode){
    cents = nearestChromaticCents(stableFreq);
    document.querySelectorAll('.string-btn.target').forEach(b=>b.classList.remove('target'));
    targetName.textContent = t('targetChromatic');
  } else {
    const {idx: bestIdx} = nearestStringMatch(stableFreq);
    // histéresis: solo cambia de cuerda "enganchada" si el nuevo candidato se
    // repite varios frames seguidos, o si el salto es tan grande que es
    // evidente que se tocó otra cuerda. Así la aguja no tiembla entre dos
    // cuerdas cercanas en afinaciones abiertas o drop.
    if(lockedIdx===-1){
      lockedIdx = bestIdx; candidateIdx=-1; candidateStreak=0;
    } else if(bestIdx !== lockedIdx){
      if(bestIdx===candidateIdx) candidateStreak++; else { candidateIdx=bestIdx; candidateStreak=1; }
      const centsFromLocked = 1200*Math.log2(stableFreq/currentStrings[lockedIdx].freq);
      if(candidateStreak>=4 || Math.abs(centsFromLocked)>150){
        lockedIdx = bestIdx; candidateStreak=0; candidateIdx=-1;
      }
    } else {
      candidateStreak=0; candidateIdx=-1;
    }
    const target = currentStrings[lockedIdx];
    cents = 1200*Math.log2(stableFreq/target.freq);
    targetName.textContent = `${t('targetPrefix')}: ${target.note}${target.octave} · ${target.freq.toFixed(2)} Hz`;
    document.querySelectorAll('.string-btn').forEach(b=>b.classList.toggle('target', Number(b.dataset.idx)===lockedIdx));
  }

  const clampedCents = Math.max(-60, Math.min(60, cents));
  displayedCents += (clampedCents - displayedCents) * 0.3;

  noteNameEl.textContent = freqToChromaticName(stableFreq);
  freqTag.textContent = stableFreq.toFixed(1)+' Hz';
  centsVal.textContent = (cents>0? '+':'')+Math.round(cents);
  const inTune = Math.abs(cents)<=4;
  noteNameEl.classList.toggle('in-tune', inTune);
  centsVal.className = 'cents ' + (inTune?'ok': (cents<0?'flat':'sharp'));
  setNeedle(displayedCents);

  rafId = requestAnimationFrame(detectPitchLoop);
}

function translateLabel(text){
  if(currentLang==='es' || !text) return text;
  let out = text;
  PHRASE_MAP.forEach(([es, tr])=>{
    if(!tr[currentLang]) return;
    out = out.split(es).join(tr[currentLang]);
  });
  return out;
}

/* ================= Preferencias (localStorage) ================= */
const PREF_KEY = 'afinadorMatilde:prefs';
function savePrefs(){
  try{
    localStorage.setItem(PREF_KEY, JSON.stringify({
      instrument: instrumentSel.value,
      tuning: tuningSel.value,
      mode: currentMode,
      a4: A4REF,
      chromatic: chromaticMode,
      lang: currentLang,
      micDeviceId: micDeviceSel.value,
      micGain: micGainSlider.value,
      noiseGate: noiseGateSlider.value,
      echoCancellation: echoCancelChk.checked,
      noiseSuppression: noiseSuppressChk.checked,
      autoGainControl: autoGainChk.checked,
    }));
  }catch(e){ /* almacenamiento no disponible, seguimos sin persistir */ }
}
function loadPrefs(){
  try{
    const raw = localStorage.getItem(PREF_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

a4Calib.addEventListener('change', ()=>{
  A4REF = parseFloat(a4Calib.value);
  rescaleFrequencies(TUNINGS);
  renderStringButtons();
  if(currentStrings.length){
    targetName.textContent = t('targetEmpty');
  }
  savePrefs();
});

chromaticToggle.addEventListener('click', ()=>{
  chromaticMode = !chromaticMode;
  chromaticToggle.classList.toggle('active', chromaticMode);
  chromaticToggle.textContent = t(chromaticMode ? 'chromaOn' : 'chromaOff');
  lockedIdx=-1; candidateIdx=-1; candidateStreak=0; freqHistory.length=0;
  document.querySelectorAll('.string-btn.target').forEach(b=>b.classList.remove('target'));
  targetName.textContent = chromaticMode ? t('targetChromatic') : t('targetEmpty');
  hint.textContent = chromaticMode
    ? t('hintChromaOn')
    : (micStream ? t('hintListening') : t('hintReady'));
  savePrefs();
});

/* ================= Inicialización con preferencias guardadas ================= */
(function initFromPrefs(){
  const prefs = loadPrefs();

  if(!prefs){
    currentLang = (navigator.language||'es').slice(0,2);
    if(!I18N[currentLang]) currentLang = 'es';
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===currentLang));
    applyStaticTexts();
    populateTunings();
    return;
  }

  if(prefs.lang && I18N[prefs.lang]){
    currentLang = prefs.lang;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===currentLang));
  }
  if(prefs.a4 && TUNINGS){ A4REF = prefs.a4; a4Calib.value = String(prefs.a4); rescaleFrequencies(TUNINGS); }
  if(prefs.mode){
    currentMode = prefs.mode;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===prefs.mode));
  }
  if(prefs.instrument && TUNINGS[prefs.instrument]){ instrumentSel.value = prefs.instrument; }
  if(prefs.micGain!==undefined){ micGainSlider.value = prefs.micGain; }
  if(prefs.noiseGate!==undefined){ noiseGateSlider.value = prefs.noiseGate; }
  if(prefs.echoCancellation!==undefined){ echoCancelChk.checked = prefs.echoCancellation; }
  if(prefs.noiseSuppression!==undefined){ noiseSuppressChk.checked = prefs.noiseSuppression; }
  if(prefs.autoGainControl!==undefined){ autoGainChk.checked = prefs.autoGainControl; }
  if(prefs.micDeviceId){ micDeviceSel.dataset.pending = prefs.micDeviceId; }

  applyStaticTexts();
  populateTunings();

  if(prefs.tuning){
    const exists = Array.from(tuningSel.options).some(o=>o.value===prefs.tuning);
    if(exists){ tuningSel.value = prefs.tuning; loadTuning(); }
  }
  if(prefs.chromatic){
    chromaticMode = true;
    chromaticToggle.classList.add('active');
    chromaticToggle.textContent = t('chromaOn');
    targetName.textContent = t('targetChromatic');
  }
})();
</script>
</body>
</html>
